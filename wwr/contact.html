<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="If you have a question regarding our services or want to schedule, feel free to contact us here.">
    <meta name="author" content="Kyle Roper">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/splash-logo.png" alt="Splash White Water Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="contact-info">
            <h1>Splash White Water Rafting</h1>
            <p>Dunkeld Rd,</p>
            <p>Aberfeldy PH15 2AQ, United Kingdom</p>
            <p>+44 999 999 9999</p>
            <p>info@splashwhitewater.com</p>
        </section>

        <section class="contact-content">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2195.027056591286!2d-3.8604205881978735!3d56.62220555316165!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4888a69d86ef6d8d%3A0xe3e0e412e8059039!2sSplash%20White%20Water%20Rafting!5e0!3m2!1sen!2sus!4v1775344814294!5m2!1sen!2sus"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>

                <p>Message Purpose</p>

                <label><input type="radio" name="purpose" value="general inquiry"> General
                    Inquiry</label>
                <label><input type="radio" name="purpose" value="reservation question"> Reservation
                    Question</label>
                <label><input type="radio" name="purpose" value="website suggestion"> Website
                    Suggestion</label>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Type here"
                  required></textarea>

                <label class="checkbox-label">
                    <input type="checkbox" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-gallery">
                <figure>
                    <img src="images/employee1.jpg" alt="Jake Wilson, River Guide">
                    <figcaption>Jake Wilson - River Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Sarah Lopez, Reservation Specialist">
                    <figcaption>Sarah Lopez - Reservation Specialist</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Emily Carter, Customer Support Manager">
                    <figcaption>Emily Carter - Customer Support Manager</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©2026 | Splash White Water Rafting | Kyle Roper</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src=images/facebook.png alt="Facebook Icon"></a>
            <a href="https://tiktok.com"><img src=images/tiktok.png alt="Tiktok Icon"></a>
            <a href="https://instagram.com"><img src=images/instagram.png alt="Instagram Icon"></a>
        </nav>
    </footer>
</body>

</html>
